<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>롤크루 — 촬영 업계 커뮤니티</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #111113; min-height: 100vh; }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    *::-webkit-scrollbar { width: 0; height: 0; }
    body { font-family: 'Pretendard', system-ui, sans-serif; color: #eee; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-system.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="home-screen.jsx"></script>
  <script type="text/babel" src="detail-screen.jsx"></script>
  <script type="text/babel" src="job-detail-screen.jsx"></script>

  <script type="text/babel">
    const TWEAKS = /*EDITMODE-BEGIN*/{
      "accent": "red",
      "layout": "list",
      "showBothModes": true
    }/*EDITMODE-END*/;

    const ACCENT_PRESETS = {
      purple: { dark: '#B47BFF', light: '#7C3FE4', inkDark: '#0B0B0C', inkLight: '#FFFFFF', name: '보라' },
      orange: { dark: '#FF7A45', light: '#E55A20', inkDark: '#0B0B0C', inkLight: '#FFFFFF', name: '오렌지' },
      amber:  { dark: '#FFC042', light: '#B8830E', inkDark: '#0B0B0C', inkLight: '#FFFFFF', name: '앰버' },
      mint:   { dark: '#5BD4A6', light: '#0F9968', inkDark: '#0B0B0C', inkLight: '#FFFFFF', name: '민트' },
      red:    { dark: '#FF6B6B', light: '#D93838', inkDark: '#FFFFFF', inkLight: '#FFFFFF', name: '레드' },
      white:  { dark: '#FFFFFF', light: '#0B0B0C', inkDark: '#0B0B0C', inkLight: '#FFFFFF', name: '모노' },
    };

    function App() {
      const [tweaks, setTweaks] = React.useState(TWEAKS);
      const [tweaksOpen, setTweaksOpen] = React.useState(false);
      const [tweaksEnabled, setTweaksEnabled] = React.useState(false);

      const [darkView, setDarkView] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem('darkView') || '{"screen":"home"}'); } catch(e) { return {screen:'home'}; }
      });
      const [lightView, setLightView] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem('lightView') || '{"screen":"detail","postId":1}'); } catch(e) { return {screen:'detail',postId:1}; }
      });

      React.useEffect(() => { localStorage.setItem('darkView', JSON.stringify(darkView)); }, [darkView]);
      React.useEffect(() => { localStorage.setItem('lightView', JSON.stringify(lightView)); }, [lightView]);

      React.useEffect(() => {
        const handler = (e) => {
          if (!e.data || typeof e.data !== 'object') return;
          if (e.data.type === '__activate_edit_mode') setTweaksEnabled(true);
          else if (e.data.type === '__deactivate_edit_mode') { setTweaksEnabled(false); setTweaksOpen(false); }
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      const updateTweak = (k, v) => {
        const next = { ...tweaks, [k]: v };
        setTweaks(next);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
      };

      const accent = ACCENT_PRESETS[tweaks.accent] || ACCENT_PRESETS.mint;
      const darkT  = { ...THEMES.dark,  accent: accent.dark,  accentInk: accent.inkDark  };
      const lightT = { ...THEMES.light, accent: accent.light, accentInk: accent.inkLight };

      const renderPhone = (theme, view, setView) => {
        const post = COMMUNITY_POSTS.find(p => p.id === view.postId);
        const job  = JOB_POSTS.find(j => j.id === view.jobId);
        const openPost = (p) => setView({ screen: 'detail',    postId: p.id });
        const openJob  = (j) => setView({ screen: 'jobDetail', jobId:  j.id });
        const back     = ()  => setView({ screen: 'home' });

        return (
          <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
            <div style={{ flex: 1, overflow: 'hidden', position: 'relative' }}>
              {view.screen === 'home' && (
                <HomeScreen theme={theme} onOpenPost={openPost} onOpenJob={openJob} layout={tweaks.layout} />
              )}
              {view.screen === 'detail' && post && (
                <DetailScreen post={post} theme={theme} onBack={back} />
              )}
              {view.screen === 'jobDetail' && job && (
                <JobDetailScreen job={job} theme={theme} onBack={back} />
              )}
            </div>
            <TabBar theme={theme} active={view.screen === 'home' ? 'home' : 'board'}
              onNav={(id) => { if (id === 'home' || id === 'board') setView({ screen: 'home' }); }} />
          </div>
        );
      };

      return (
        <div style={{
          minHeight: '100vh',
          background: 'radial-gradient(ellipse at top, #1e1e22, #0a0a0b 70%)',
          padding: '40px 20px 60px',
          display: 'flex', flexDirection: 'column', alignItems: 'center',
          fontFamily: FONT_SANS,
        }}>
          {/* 상단 타이틀 */}
          <div style={{ textAlign: 'center', marginBottom: 28 }}>
            <div style={{ fontFamily: FONT_MONO, fontSize: 10, letterSpacing: 3, color: '#666', marginBottom: 8 }}>
              ROLLCREW · 촬영 업계 직장인 커뮤니티
            </div>
            <div style={{ fontSize: 30, fontWeight: 800, letterSpacing: -1, color: '#f5f5f5', fontFamily: FONT_DISPLAY }}>
              롤크루<span style={{ color: accent.dark }}>.</span>
            </div>
            <div style={{ fontSize: 12, color: '#666', marginTop: 6 }}>
              영화 · 드라마 · CF · 유튜브 촬영 업계 커뮤니티
              {!tweaksEnabled && <span style={{ color: '#444' }}> · 상단 Tweaks 토글로 변형 가능</span>}
            </div>
          </div>

          {/* 폰 배치 */}
          <div style={{ display: 'flex', gap: 48, flexWrap: 'wrap', justifyContent: 'center', alignItems: 'flex-start' }}>
            {tweaks.showBothModes ? (
              <>
                <PhoneFrame theme={darkT} label="DARK">
                  {renderPhone(darkT, darkView, setDarkView)}
                </PhoneFrame>
                <PhoneFrame theme={lightT} label="LIGHT">
                  {renderPhone(lightT, lightView, setLightView)}
                </PhoneFrame>
              </>
            ) : (
              <PhoneFrame theme={darkT} label="DARK">
                {renderPhone(darkT, darkView, setDarkView)}
              </PhoneFrame>
            )}
          </div>

          {/* Tweaks 패널 */}
          {tweaksEnabled && (
            <div style={{
              position: 'fixed', bottom: 20, right: 20, width: 272,
              background: 'rgba(16,16,18,0.97)', borderRadius: 14,
              border: '1px solid #2a2a2e', backdropFilter: 'blur(12px)',
              boxShadow: '0 20px 60px rgba(0,0,0,0.6)', zIndex: 1000,
              fontFamily: FONT_SANS, color: '#eee', overflow: 'hidden',
            }}>
              <div onClick={() => setTweaksOpen(v => !v)} style={{
                padding: '12px 14px', display: 'flex', alignItems: 'center',
                cursor: 'pointer', borderBottom: tweaksOpen ? '1px solid #242428' : 'none',
              }}>
                <div style={{ width: 7, height: 7, borderRadius: 4, background: accent.dark, marginRight: 8, boxShadow: `0 0 8px ${accent.dark}` }} />
                <div style={{ fontFamily: FONT_MONO, fontSize: 10, letterSpacing: 1.5, color: '#777', fontWeight: 700 }}>TWEAKS</div>
                <div style={{ flex: 1 }} />
                <div style={{ fontSize: 11, color: '#666' }}>{tweaksOpen ? '▾' : '▸'}</div>
              </div>
              {tweaksOpen && (
                <div style={{ padding: 14, display: 'flex', flexDirection: 'column', gap: 16 }}>

                  {/* 포인트 컬러 */}
                  <div>
                    <div style={{ fontSize: 11, color: '#888', fontWeight: 600, marginBottom: 8 }}>포인트 컬러</div>
                    <div style={{ display: 'flex', gap: 7, flexWrap: 'wrap' }}>
                      {Object.entries(ACCENT_PRESETS).map(([k, v]) => (
                        <button key={k} onClick={() => updateTweak('accent', k)} style={{
                          width: 32, height: 32, borderRadius: 8, border: tweaks.accent === k ? '2.5px solid #fff' : '1.5px solid #333',
                          background: v.dark, cursor: 'pointer', padding: 0,
                        }} title={v.name} />
                      ))}
                    </div>
                  </div>

                  {/* 피드 레이아웃 */}
                  <div>
                    <div style={{ fontSize: 11, color: '#888', fontWeight: 600, marginBottom: 8 }}>피드 레이아웃</div>
                    <div style={{ display: 'flex', gap: 6 }}>
                      {[{id:'list',label:'리스트'},{id:'card',label:'카드'},{id:'dense',label:'컴팩트'}].map(o => (
                        <button key={o.id} onClick={() => updateTweak('layout', o.id)} style={{
                          flex: 1, padding: '8px 0', borderRadius: 7,
                          border: `1px solid ${tweaks.layout === o.id ? accent.dark : '#2e2e32'}`,
                          background: tweaks.layout === o.id ? accent.dark : 'transparent',
                          color: tweaks.layout === o.id ? accent.inkDark : '#bbb',
                          fontSize: 11, fontWeight: 700, cursor: 'pointer',
                        }}>{o.label}</button>
                      ))}
                    </div>
                  </div>

                  {/* 두 모드 동시 */}
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                    <div style={{ fontSize: 11, color: '#888', fontWeight: 600 }}>다크+라이트 동시 보기</div>
                    <button onClick={() => updateTweak('showBothModes', !tweaks.showBothModes)} style={{
                      width: 44, height: 26, borderRadius: 13, border: 'none', padding: 2, cursor: 'pointer',
                      background: tweaks.showBothModes ? accent.dark : '#3a3a40',
                      display: 'flex', alignItems: 'center',
                      justifyContent: tweaks.showBothModes ? 'flex-end' : 'flex-start',
                      transition: 'background 0.2s',
                    }}>
                      <div style={{ width: 22, height: 22, borderRadius: 11, background: '#fff' }} />
                    </button>
                  </div>

                </div>
              )}
            </div>
          )}

          <div style={{ marginTop: 40, fontFamily: FONT_MONO, fontSize: 10, letterSpacing: 2, color: '#444' }}>
            ── rollcrew · {new Date().toISOString().slice(0,10)} ──
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
